            animation: {

              'pulse': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',

            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }

</head>

            { no: "22nd", year: "2022", city: "Orlando", cityCN: "奥兰多", country: "USA", lat: 28.5383, lon: -81.3792, pos: "top" },

                    DASFAA 2027

                  </div>

                       <div className="text-2xl font-serif font-bold tracking-widest text-white border-2 border-white px-2">DASFAA</div>

                    </div>

                    <div className="flex items-center gap-2">
                       <div className="w-10 h-10 rounded-full border-2 border-white flex items-center justify-center font-bold bg-blue-900">NEU</div>
                       <span className="text-sm font-bold text-left">东北大学<br/>Northeastern Univ.</span>
                    </div>
                  </div>

                <div className="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-slate-950 to-transparent z-10 pointer-events-none"></div>
              </section>

              {/* Legacy Timeline (Map Visualization) */}
              <section id="legacy" className="py-20 bg-slate-900/50">
                <div className="container mx-auto px-6">
                  <div className="text-center mb-16">
                    <h2 className="text-3xl font-bold text-cyan-400 mb-2 tracking-widest">THE LEGACY</h2>
                    <p className="text-white text-xl">历史传承：从硅谷到沈阳，始终站在技术浪潮之巅</p>
                  </div>

                  <div className="relative w-full max-w-6xl mx-auto aspect-[2.4/1] bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden shadow-2xl">
                        {/* Map Background */}
                        <img 
                            src="https://upload.wikimedia.org/wikipedia/commons/b/b0/World_location_map_%28equirectangular_180%29.svg"
                            alt="World Map"
                            className="absolute inset-0 w-full h-full object-cover opacity-40"
                            style={{
                                filter: 'invert(1) grayscale(1) brightness(2.5) contrast(1.2)',
                                objectPosition: 'top'
                            }}
                        />
                        
                        {/* Arc Line from 2001 to 2027 */}
                        <svg className="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style={{stopColor: '#fbbf24', stopOpacity: 0.8}} /> {/* Amber for 2001 */}
                                    <stop offset="100%" style={{stopColor: '#22d3ee', stopOpacity: 0.8}} /> {/* Cyan for 2027 */}
                                </linearGradient>
                            </defs>
                            {/* San Jose (16.14, 35.10) to Shenyang (84.28, 32.13) - Adjusted for new aspect ratio (cutting off Antarctica) */}
                            <path d="M 16.14 35.10 Q 50.21 6 84.28 32.13" stroke="url(#grad1)" strokeWidth="0.3" fill="none" strokeDasharray="1 1" className="animate-[dash_20s_linear_infinite]" />
                        </svg>

                        {/* Map Points */}
                        {legacyData.map((item, idx) => {
                            const x = (item.lon + 180) / 360 * 100;
                            // Adjusted y calculation: map now shows 90N to 60S (150 degrees span instead of 180)
                            const y = (90 - item.lat) / 150 * 100;
                            
                            let labelClass = "";
                            switch(item.pos) {
                                case 'top': labelClass = "bottom-full mb-1 left-1/2 -translate-x-1/2"; break;
                                case 'bottom': labelClass = "top-full mt-1 left-1/2 -translate-x-1/2"; break;
                                case 'left': labelClass = "right-full mr-1.5 top-1/2 -translate-y-1/2"; break;
                                case 'right': labelClass = "left-full ml-1.5 top-1/2 -translate-y-1/2"; break;
                                default: labelClass = "bottom-full mb-1 left-1/2 -translate-x-1/2";
                            }

                            const isStart = item.year === "2001";

                            return (
                                <div 
                                    key={idx}
                                    className="absolute"
                                    style={{ left: `${x}%`, top: `${y}%` }}
                                >
                                    {/* Dot */}
                                    <div className={`w-2 h-2 md:w-3 md:h-3 -ml-1 -mt-1 md:-ml-1.5 md:-mt-1.5 rounded-full ${item.highlight ? 'bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,1)] z-30' : (isStart ? 'bg-amber-400 shadow-[0_0_10px_rgba(251,191,36,0.8)] z-30' : 'bg-slate-400 z-10')}`}></div>

                                            <span className="text-white font-bold">{item.city}</span>
                                        </div>
                                    )}
                                </div>
                            );

            <h3 className="text-3xl font-bold text-white mb-1 group-hover:text-cyan-400 transition-colors">{title}</h3>
            <div className="text-lg font-semibold text-slate-300 mb-2">{desc}</div>
            <div className="text-sm text-slate-500">{sub}</div>
          </div>
        );

          const isRight = align === 'right';
          const isCenter = align === 'center';
          
          return (
            <div className={`flex flex-col md:flex-row items-center justify-between gap-4 md:gap-0 ${highlight ? 'scale-105' : ''}`}>
              <div className={`md:w-5/12 ${isRight ? 'order-last md:order-first md:text-right invisible hidden md:block' : 'text-center md:text-right'} ${highlight ? 'md:text-cyan-400' : ''}`}>
                 {!isRight && !isCenter && (
                   <>
                    <div className="text-2xl font-bold">{year}</div>
                    <div className="text-lg text-slate-300">{city}</div>
                    <div className="text-sm text-slate-500 mt-2 font-bold">{title}</div>
                    <div className="text-xs text-slate-500">{desc}</div>
                   </>
                 )}
              </div>

              <div className="w-8 h-8 rounded-full border-4 border-slate-900 z-10 flex-shrink-0 relative">
                <div className={`w-full h-full rounded-full ${highlight ? 'bg-cyan-400 animate-pulse' : 'bg-slate-600'}`}></div>
                {isCenter && <div className="absolute top-10 left-1/2 -translate-x-1/2 text-cyan-400 font-bold text-xl">{year}</div>}
              </div>

              <div className={`md:w-5/12 ${!isRight && !isCenter ? 'invisible hidden md:block' : 'text-center md:text-left'} ${highlight ? 'order-last' : ''}`}>
                {(isRight || isCenter) && (
                   <div className={`${isCenter ? 'pt-8' : ''}`}>
                     {!isCenter && <div className="text-2xl font-bold">{year}</div>}
                     <div className={`text-lg ${highlight ? 'text-cyan-300 font-bold text-2xl' : 'text-slate-300'}`}>{city}</div>
                     <div className="text-sm text-slate-400 mt-2 font-bold">{title}</div>
                     <div className="text-xs text-slate-500">{desc}</div>
                   </div>
                 )}
              </div>
            </div>
          );
        };

        const TopicCard = ({ icon, title, desc, color }) => (
          <div className="p-6 bg-slate-900 rounded-xl border border-slate-800 hover:bg-slate-800 transition-colors h-full flex flex-col justify-center items-center text-center">

            <div className="font-bold text-slate-200 text-xl mb-2">{title}</div>
            <div className="text-base text-slate-500 leading-tight break-words">{desc}</div>

        const ReasonCard = ({ icon, title, desc }) => (
          <div className="text-center p-6 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 transition-colors">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 text-white mb-6 shadow-lg shadow-cyan-500/30">

            <h3 className="text-xl font-bold text-white mb-4">{title}</h3>
            <p className="text-slate-400 leading-relaxed text-base">

              {label}
              {highlight && <span className="ml-2 text-sm bg-amber-500 text-black px-1 rounded font-bold">HOT</span>}
            </div>
            <div className="col-span-1 py-3 text-cyan-200 bg-cyan-900/10 md:bg-transparent rounded md:rounded-none flex justify-center items-center text-lg">
              {t === true ? <CheckCircle className="w-6 h-6 text-cyan-400" /> : t}

            <div className="col-span-1 py-3 text-slate-200 flex justify-center items-center text-lg">

            <div className="col-span-1 py-3 text-slate-300 flex justify-center items-center text-lg">

            </div>
            <div className="col-span-1 py-3 text-amber-200 flex justify-center items-center text-lg">
              {g === true ? <CheckCircle className="w-6 h-6 text-amber-400" /> : g}
            </div>
            <div className="col-span-1 py-3 text-slate-400 flex justify-center items-center text-lg">
              {s === true ? <CheckCircle className="w-6 h-6 text-slate-500" /> : s}
            </div>

        root.render(<DASFAA2026Poster />);
