<!DOCTYPE html>

<head>

    <!-- 3. Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 4. Import Lucide Icons (Vanilla JS version) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Configure Tailwind Animations -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              'fade-in-up': 'fadeInUp 1s ease-out forwards',
              'pulse': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
</head>

        const Calendar = (props) => <IconWrapper name="calendar" {...props} />;

        const BrainCircuit = (props) => <IconWrapper name="brain-circuit" {...props} />;
        const ShieldCheck = (props) => <IconWrapper name="shield-check" {...props} />;

            { no: "2nd", year: "2002", city: "Maebashi City", country: "JP", lat: 36.3895, lon: 139.0634, pos: "right" },

                      <span className="text-lg">Dates TBA, 2027</span>
                    </div>
                    <div className="h-6 w-px bg-slate-600 hidden md:block"></div>
                    <div className="flex items-center gap-2">
                      <MapPin className="w-6 h-6 text-cyan-400" />
                      <span className="text-lg">Shenyang, China</span>
                    </div>
                  </div>

                    </div>
                    <div className="h-8 w-px bg-white/30"></div>
                    <div className="flex items-center gap-2">
                       <div className="w-10 h-10 rounded-full border-2 border-white flex items-center justify-center font-bold bg-blue-900">NEU</div>
                       <span className="text-sm font-bold text-left">Northeastern Univ.</span>
                    </div>
                  </div>
                </div>
                
                <div className="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-slate-950 to-transparent z-10 pointer-events-none"></div>
              </section>

              {/* Core Highlights */}

                <div className="container mx-auto px-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <HighlightCard 
                      icon={<Award className="w-8 h-8 text-amber-400" />}
                      title="CORE Rank A*"
                      desc="Top Tier Conference"
                      sub="CCF Rank B"
                    />
                    <HighlightCard 
                      icon={<Globe className="w-8 h-8 text-cyan-400" />}
                      title="Global Premier"
                      desc="World-class Event"
                      sub="26 Years of Legacy"
                    />
                    <HighlightCard 
                      icon={<Users className="w-8 h-8 text-emerald-400" />}
                      title="1000+ Attendees"
                      desc="Top-tier Global Scholars"
                      sub="Connecting Top Minds"
                    />
                    <HighlightCard 
                      icon={<TrendingUp className="w-8 h-8 text-rose-400" />}
                      title="< 20% Rate"
                      desc="Highly Selective"
                      sub="Defining Standards"
                    />

                      <br className="hidden md:block my-4" />
                      <span className="block mt-4 md:mt-0">As the world's premier database systems and advanced applications event, DASFAA 2027 continues its legacy in Shenyang.</span>
                    </p>
                  </div>
                </div>
              </section>

              <section id="legacy" className="py-20 bg-slate-900/50">

                  <div className="text-center mb-16">
                    <h2 className="text-3xl font-bold text-cyan-400 mb-2 tracking-widest">THE LEGACY</h2>
                    <p className="text-white text-xl">From Silicon Valley to Shenyang, Always at the Forefront of Technology</p>
                  </div>

                  <div className="relative w-full max-w-6xl mx-auto aspect-[2.4/1] bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden shadow-2xl">
                        {/* Map Background */}
                        <img 
                            src="https://upload.wikimedia.org/wikipedia/commons/b/b0/World_location_map_%28equirectangular_180%29.svg"
                            alt="World Map"
                            className="absolute inset-0 w-full h-full object-cover opacity-40"
                            style={{
                                filter: 'invert(1) grayscale(1) brightness(2.5) contrast(1.2)',
                                objectPosition: 'top'
                            }}
                        />
                        
                        {/* Arc Line from 2001 to 2027 */}
                        <svg className="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style={{stopColor: '#fbbf24', stopOpacity: 0.8}} /> {/* Amber for 2001 */}
                                    <stop offset="100%" style={{stopColor: '#22d3ee', stopOpacity: 0.8}} /> {/* Cyan for 2027 */}
                                </linearGradient>
                            </defs>
                            {/* San Jose (16.14, 35.10) to Shenyang (84.28, 32.13) - Adjusted for new aspect ratio (cutting off Antarctica) */}
                            <path d="M 16.14 35.10 Q 50.21 6 84.28 32.13" stroke="url(#grad1)" strokeWidth="0.3" fill="none" strokeDasharray="1 1" className="animate-[dash_20s_linear_infinite]" />
                        </svg>

                        {/* Map Points */}
                        {legacyData.map((item, idx) => {
                            const x = (item.lon + 180) / 360 * 100;
                            // Adjusted y calculation: map now shows 90N to 60S (150 degrees span instead of 180)
                            const y = (90 - item.lat) / 150 * 100;
                            
                            let labelClass = "";
                            switch(item.pos) {
                                case 'top': labelClass = "bottom-full mb-1 left-1/2 -translate-x-1/2"; break;
                                case 'bottom': labelClass = "top-full mt-1 left-1/2 -translate-x-1/2"; break;
                                case 'left': labelClass = "right-full mr-1.5 top-1/2 -translate-y-1/2"; break;
                                case 'right': labelClass = "left-full ml-1.5 top-1/2 -translate-y-1/2"; break;
                                default: labelClass = "bottom-full mb-1 left-1/2 -translate-x-1/2";
                            }

                            const isStart = item.year === "2001";

                            return (
                                <div 
                                    key={idx}
                                    className="absolute"
                                    style={{ left: `${x}%`, top: `${y}%` }}

                                    {/* Year Label Removed */}

                                    {isStart && (
                                        <div className={`absolute top-full mt-2 left-1/2 -translate-x-[70%] px-1.5 py-0.5 bg-amber-900/80 border border-amber-500/50 rounded text-[9px] whitespace-nowrap z-40 shadow-lg backdrop-blur-sm`}>

                                    )}

                              <img src="../_upload/tpl/02/82/642/template642/images/hall_of_fame/Yoshua_Bengio.jpg" alt="Yoshua Bengio" className="w-full h-full object-cover" />

                            </div>
